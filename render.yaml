services:
  - type: web
    name: snappysjaak-shadow
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    disk:
      name: shadow-cache
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: SNAPPYSJAAK_CACHE_DIR
        value: /var/data/snappysjaak-cache
      - key: PYTHON
        value: python3
      - key: TRIGGER_POLLER_ON_SYNC
        value: "0"
      - key: AUTO_SYNC_THROTTLE_MINUTES
        value: "5"
      - key: LOCAL_ARCHIVE_ROOT
        value: ""
      - key: GOOGLE_DRIVE_ROOT_FOLDER_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_DRIVE_ACCOUNT_NAMES
        sync: false
